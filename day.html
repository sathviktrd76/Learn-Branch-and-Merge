<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World button</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <button id="helloButton">Click me!</button>
    <button id="myWebsiteButton">My Website</button>
    <script>
        const button = document.getElementById('helloButton');
        button.addEventListener('click', () => {
            alert('Hello, World!');
        });

        const myWebsiteButton = document.getElementById('myWebsiteButton');
        myWebsiteButton.addEventListener('click', () => {
            alert('Welcome to my website!');
        });
    </script>
</body>
</html>
